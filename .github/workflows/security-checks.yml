name: Security Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure secret env files are not tracked
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "ERROR: .env is tracked by git. Remove it and rotate exposed keys."
            exit 1
          fi
          if git grep -n "sb_publishable_" -- ':!*.example' ':!.github/workflows/security-checks.yml' >/dev/null 2>&1; then
            echo "ERROR: Supabase publishable key pattern found in tracked files."
            exit 1
          fi
          echo "No tracked .env or publishable key leaks detected."

      - name: Run production dependency audit
        run: npm run security:audit:prod
